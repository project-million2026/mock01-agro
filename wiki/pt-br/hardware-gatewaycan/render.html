<div><h1 id="️-hardware-gateway-can" class="toc-header"><a href="#️-hardware-gateway-can" class="toc-anchor">¶</a> ⚙️ Hardware - GATEWAY CAN</h1><div></div><p>Gateway CAN contempla as seguintes especificações.</p><div></div><figure class="image image_resized" style="width: 28.59%;"><img src="/gatewan_can_foto.png"></figure><div></div><p>&nbsp;</p><div></div><figure class="table"><table style="border-width: medium; border-style: solid; border-color: currentcolor;"><tbody><tr><td><strong>Alimentação</strong></td> <td><p>8 a 40 VDC</p> <p>Consumo de ~30 mA</p></td></tr> <tr><td><strong>Proteção de Tensão</strong></td> <td><p>Proteção de tensão máxima em entradas:</p> <ul><li>50V na IN0</li> <li>50V na IN1</li></ul></td></tr> <tr><td><strong>Entradas</strong></td> <td><p>2 entradas (IN0 e IN1):</p> <ul><li>IN0 pode ser utilizada como analógica para ignição</li> <li>IN1 pode ser utilizada como digital para limpador de para-brisas</li></ul></td></tr> <tr><td><strong>Rede CAN</strong></td> <td>Leitura CAN física por conector OBD II&nbsp; (CANH, CANL, +VCC, GND)</td></tr> <tr><td><strong>Integração</strong></td> <td><ul><li>COM Principal TTL/RS-232 (liga em rastreadores ou câmera)</li> <li>COM Secundário TTL/RS-232 (leitor RFID, teclado)</li></ul></td></tr> <tr><td><strong>Bluetooth</strong></td> <td>Bluetooth Low Energy 5.2&nbsp;</td></tr> <tr><td><strong>Temperatura de operação</strong></td> <td><ul><li>0ºC a 74ºC</li></ul></td></tr> <tr><td><strong>Outros Recursos</strong></td> <td><ul><li>Chicote de instalação</li> <li>Conector OBD II Fêmea para ligação direta na rede CAN</li> <li>Protocolo de comunicação transparente</li> <li>Indicadores de atividade por LED<mark class="pen-red"> vermelho</mark>/<mark class="pen-green">verde</mark></li></ul></td></tr></tbody></table></figure><div></div></div>
