ro</strong></th> <td>Acelerômetro de 3 eixos com medição plana ou rotacional de eixos</td></tr> <tr><th><strong>SIMCard</strong></th> <td>1 SimCARD (Mini-SIM 2FF)</td></tr> <tr><th><strong>Rede CAN</strong></th> <td>1 porta CAN</td></tr> <tr><th><strong>Portas de Comunicação</strong></th> <td><ul><li>1 porta serial TTL com velocidade de transmissão configurável (1200 a 115200 bps)</li> <li>1 porta serial RS-232/RS-485 com velocidade de transmissão configurável (1200 a 115200 bps)</li> <li>1 porta Ethernet 10/100Mbps</li></ul></td></tr> <tr><th><strong>Gabinete</strong></th> <td><ul><li>Gabinete resistente a água e poeira com grau de proteção IP67</li> <li>Material: policarbonato</li></ul></td></tr> <tr><th><strong>Temperatura de operação</strong></th> <td><ul><li>0°C a 65°C (com bateria)</li> <li>-20°C a 85°C (sem bateria)</li></ul></td></tr></tbody></table></figure><div></div><p>&nbsp;</p><div></div></div>
