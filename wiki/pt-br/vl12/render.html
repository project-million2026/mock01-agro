th> <td><ul><li>2 saídas em NA (coletor aberto) protegidas com polyswitch de 400mA</li> <li>2 saídas adicionais apenas na versão FULL</li> <li>Qualquer uma das saídas digitais padrão pode ser usada como OneWire em conjunto com uma entrada</li></ul></td></tr> <tr><th><strong>Acelerômetro</strong></th> <td>Acelerômetro de 3 eixos com medição plana ou rotacional de eixos</td></tr> <tr><th><strong>SIMCard</strong></th> <td><ul><li>Padrão: 1 SimCARD (Micro-SIM 3FF)</li> <li>Opcional 2 SimCARDs (Micro-SIM 3FF)</li></ul></td></tr> <tr><th><strong>Rede CAN</strong></th> <td>1 porta CAN</td></tr> <tr><th><strong>Porta de Comunicação</strong></th> <td><ul><li>1 porta de comunicação serial RS-232/RS485 com velocidade de transmissão configurável de 1200 a 115200 bps</li> <li>1 porta de comunicação TTL adicional com velocidade de transmissão configurável de 1200 a 115200 bps (apenas na versão FULL)</li></ul></td></tr> <tr><th><strong>Gabinete</strong></th> <td><ul><li>Gabinete resistente a água e poeira com grau de proteção IP53</li></ul></td></tr> <tr><th><strong>Temperatura de operação</strong></th> <td><ul><li>0°C a 65°C (com bateria)</li> <li>-20°C a 85°C (sem bateria)</li></ul></td></tr></tbody></table></figure><div></div><p>&nbsp;</p><div></div></div>
