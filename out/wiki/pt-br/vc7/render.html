<div><h1 id="️-hardware-vircom-07" class="toc-header"><a href="#️-hardware-vircom-07" class="toc-anchor">¶</a> ⚙️ Hardware - VIRCOM 07</h1><div></div><p>VC07 contempla as seguintes especificações.</p><div></div><figure class="image image_resized" style="width: 26.39%;"><img src="/vircom7.png"></figure><div></div><figure class="table"><table style="border-width: medium; border-style: inset; border-color: rgb(255, 255, 255);"><tbody><tr><th><strong>Alimentação</strong></th> <td>Alimentação de 8 a 30 VCC</td></tr> <tr><th><strong>Cabo</strong></th> <td>Cabo para conexão de 20 vias incluso</td></tr> <tr><th><strong>Memória</strong></th> <td>Memória flash de 128Mb com capacidade para 1.000.000 de registros (para buffers, logs, cercas, cartões e áudios)</td></tr> <tr><th><strong>Antenas</strong></th> <td>Antenas GSM, GNSS, Wifi, Bluetooth, Lora e RFID integradas</td></tr> <tr><th><strong>Posicionador</strong></th> <td><ul><li>Posicionador GPS/GLONASS/Galileo/QZSS L86</li> <li>Sensibilidade de -167dBm</li> <li>99 canais de aquisição, 33 canais de rastreamento</li></ul></td></tr> <tr><th><strong>Modem</strong></th> <td>Modem LTE CAT-M1 e NB-IoT com fallback para 2G</td></tr> <tr><th><strong>Bluetooth</strong></th> <td><ul><li>Placas com módulo BX3105: Bluetooth Clássico (Serial) v4.2</li> <li>Placas com FC41D: Bluetooth Low Energy (BLE) v5.2</li></ul></td></tr> <tr><th><strong>Wifi</strong></th> <td><ul><li>Wifi 2.4Ghz 802.11b/g/n/e/i</li></ul></td></tr> <tr><th><strong>Lora</strong><br><strong>(Rede V# Mesh)</strong></th> <td><ul><li>ISM 915Mhz</li> <li>Modulação por espectro expandido e saltos de frequência FHSS (Frequency Hopping Spread Spectrum)</li></ul></td></tr> <tr><th><strong>Bateria</strong></th> <td><ul><li>Bateria interna de 1100 mA/h</li></ul></td></tr> <tr><th><strong>Leitor RFID</strong></th> <td><ul><li>RFID 13,56Mhz integrado</li></ul></td></tr> <tr><th><strong>Saída de Áudio</strong></th> <td><ul><li>1 saída de áudio amplificado 3W</li></ul></td></tr> <tr><th><strong>Entradas</strong></th> <td><ul><li>1 entrada analógica</li> <li>Até 5 entradas digitais (IN0 a IN4) com múltiplas funções:<ul><li>IN0, IN1, IN3 e IN4 pode ser utilizada como leitura de pulsos ou digital</li> <li>IN2 pode ser utilizada como RX da porta COM1 (serial TTL), leitura de pulsos ou digital</li></ul></li></ul></td></tr> <tr><th><strong>Saídas</strong></th> <td><ul><li>OUT0 e OUT1 em NA (coletor aberto) protegidas com polyswitch de 400mA</li> <li>OUT1 pode ser usada como saída digital ou TX da porta COM1 (serial TTL)</li> <li>OUT1 pode ser porta OneWire (para leitor i-button e sensores de temperatura)</li></ul></td></tr> <tr><th><strong>Acelerômetro</strong></th> <td>Acelerômetro de 3 eixos com medição plana ou rotacional de eixos</td></tr> <tr><th><strong>SIMCard</strong></th> <td>SIMCARD (Micro-SIM 3FF)</td></tr> <tr><th><strong>Rede CAN</strong></th> <td><ul><li>2 portas CAN</li> <li>Leitura da rede CAN por cabo utilizando entradas IN1 e IN2</li> <li>Leitura da rede CAN por periférico indutivo (VirCAN) utilizando entradas IN1 e IN2 ou CAN2</li></ul></td></tr> <tr><th><strong>Porta de Comunicação</strong></th> <td><ul><li>1 porta de comunicação serial TTL com velocidade de transmissão configurável (1200 a 115200 bps)</li></ul></td></tr> <tr><th><strong>Gabinete</strong></th> <td><ul><li>Gabinete resistente a água e poeira com grau de proteção IP53</li></ul></td></tr> <tr><th><strong>Temperatura de operação</strong></th> <td><ul><li>0°C a 65°C (com bateria)</li> <li>-20°C a 85°C (sem bateria)</li></ul></td></tr></tbody></table></figure><div></div><p>&nbsp;</p><div></div></div>
