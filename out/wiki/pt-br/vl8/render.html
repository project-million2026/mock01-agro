<div><h1 id="️-hardware-virloc-08" class="toc-header"><a href="#️-hardware-virloc-08" class="toc-anchor">¶</a> ⚙️ Hardware - VIRLOC 08</h1><div></div><p>VL8 contempla as seguintes especificações.</p><div></div><figure class="image image_resized" style="width: 25.13%;"><img src="/vl8.png"></figure><div></div><figure class="table"><table style="border-width: medium; border-style: inset; border-color: rgb(255, 255, 255);"><tbody><tr><th><strong>Alimentação</strong></th> <td><ul><li>Alimentação de 8 a 40 VCC</li></ul></td></tr> <tr><th>Dimensões</th> <td><p>LARGURA : 9 cm</p> <p>COMPRIMENTO: 11 cm</p> <p>ALTURA: 3 cm</p> <p>CABO: 1,4 m</p> <p>PESO: 0,295 kg</p></td></tr> <tr><th><strong>Cabo</strong></th> <td><p>Cabos para conexão inclusos:</p> <ul><li>8 vias para entradas, saídas, alimentação e CAN1</li> <li>4 vias para áudio e CAN2</li></ul></td></tr> <tr><th><strong>Memória</strong></th> <td>Memória flash de 128Mb com capacidade para 1.000.000 de registros (para buffers, logs, cercas, cartões e áudios)</td></tr> <tr><th><strong>Antenas</strong></th> <td>Antenas GSM, GNSS, Wifi, Bluetooth, Lora e RFID integradas (Lora e RFID apenas na versão FULL)</td></tr> <tr><th><strong>Posicionador</strong></th> <td><ul><li>Posicionador GPS/GLONASS/Galileo/QZSS L86</li> <li>Sensibilidade de -167dBm</li> <li>99 canais de aquisição, 33 canais de rastreamento</li></ul></td></tr> <tr><th><strong>Modem</strong></th> <td>Modem LTE CAT-M1 e NB-IoT com fallback para 2G</td></tr> <tr><th><strong>Bluetooth</strong></th> <td><ul><li>Placas com módulo BX3105: Bluetooth Clássico (Serial) v4.2</li> <li>Placas com FC41D: Bluetooth Low Energy (BLE) v5.2</li></ul></td></tr> <tr><th><strong>Wifi</strong></th> <td><ul><li>Wifi 2.4Ghz 802.11b/g/n/e/i</li></ul></td></tr> <tr><th><strong>Lora</strong><br><strong>(Rede V# Mesh)</strong></th> <td><ul><li>ISM 915Mhz (apenas na versão FULL)</li> <li>Modulação por espectro expandido e saltos de frequência FHSS (Frequency Hopping Spread Spectrum)</li></ul></td></tr> <tr><th><strong>Bateria</strong></th> <td><ul><li>Bateria interna de 1100 mA/h</li></ul></td></tr> <tr><th><strong>Leitor RFID</strong></th> <td><ul><li>RFID 13,56Mhz integrado (apenas na versão FULL)</li></ul></td></tr> <tr><th><strong>Saída de Áudio</strong></th> <td><ul><li>1 saída de áudio amplificado 3W</li></ul></td></tr> <tr><th><strong>Proteção de tensão&nbsp;</strong></th> <td><p>Proteção de tensão máxima em entradas:</p> <ul><li>48V na IN0</li> <li>20V em IN1 e IN2</li> <li>8V em IN3 e IN4</li></ul></td></tr> <tr><th><strong>Entradas</strong></th> <td><p>Até 5 entradas (IN0 a IN4) com múltiplas funções:</p> <ul><li>IN0 pode ser utilizada como digital, analógica (com faixa de leitura de 0 a 30Vcc) ou ignição;</li> <li>IN1 e IN2 podem ser utilizadas para leitura CAN, leitura de pulsos ou digital</li> <li>IN3 pode ser utilizada como RX da porta COM1 (serial TTL) ou digital</li> <li>IN04 digital e compartilhada com saída OUT0</li> <li>IN0 possui pullup de 10k a 3V em modo digital ou pulldown de 10k a GND em modo analógico</li> <li>IN2 é compartilhada com saída VOT1 protegida com polyswitch de 250mA (podendo ser utilizada como saída de alimentação com tensão de 4,2V)</li></ul></td></tr> <tr><th><strong>Saídas</strong></th> <td><ul><li>OUT0 e OUT1 em NA (coletor aberto) protegidas com polyswitch de 400mA</li> <li>OUT1 pode ser usada como saída digital ou TX da porta COM1 (serial TTL)</li> <li>OUT0 pode ser porta OneWire (para leitor i-button e sensores de temperatura)</li> <li>OUT1 possui pullup de 5K a 3V</li></ul></td></tr> <tr><th><strong>Acelerômetro</strong></th> <td>Acelerômetro de 3 eixos com medição plana ou rotacional de eixos</td></tr> <tr><th><strong>SIMCard</strong></th> <td>Duplo SIMCARD (Mini-SIM 2FF)</td></tr> <tr><th><strong>Rede CAN</strong></th> <td><ul><li>2 portas CAN:<ul><li>Leitura da rede CAN 1 por cabo utilizando entradas IN1 e IN2 (com possibilidade para scanner de PGNs e Protocolo OBD2)</li> <li>Leitura de rede CAN 2 por cabo (sem possibilidade para scanner de PGNs e Protocolo OBD2)</li></ul></li> <li>Leitura da rede CAN por periférico indutivo (VirCAN) utilizando CAN1 ou CAN2</li></ul></td></tr> <tr><th><strong>Porta de Comunicação</strong></th> <td><ul><li>1 porta de comunicação serial TTL com velocidade de transmissão configurável (1200 a 115200 bps)</li></ul></td></tr> <tr><th><strong>Gabinete</strong></th> <td><ul><li>Gabinete resistente a água e poeira com grau de proteção IP66</li></ul></td></tr> <tr><th><strong>Temperatura de operação</strong></th> <td><ul><li>0°C a 65°C (com bateria)</li> <li>-20°C a 85°C (sem bateria)</li></ul></td></tr></tbody></table></figure><div></div><p>&nbsp;</p><div></div><h1 id="modelos-de-virloc-08" class="toc-header"><a href="#modelos-de-virloc-08" class="toc-anchor">¶</a> ? Modelos de Virloc 08</h1><div></div><figure class="image"><img src="/vl8_modelos.png"></figure><div></div><p>&nbsp;</p><div></div><p>&nbsp;</p><div></div></div>
