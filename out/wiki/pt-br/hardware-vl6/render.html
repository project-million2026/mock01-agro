<div><h1 id="️-hardware-virloc-06" class="toc-header"><a href="#️-hardware-virloc-06" class="toc-anchor">¶</a> ⚙️ Hardware - VIRLOC 06</h1><div></div><p>O VL06 contempla as seguintes especificações.</p><div></div><figure class="image image_resized" style="width: 25.06%;"><img src="/vl6.png"></figure><div></div><figure class="table"><table style="border-width: medium; border-style: inset; border-color: rgb(255, 255, 255);"><tbody><tr><th><strong>Alimentação</strong></th> <td>8 a 40 VDC</td></tr> <tr><th><strong>Cabo</strong></th> <td>Cabo para conexão de 8 vias incluso</td></tr> <tr><th><strong>Antenas</strong></th> <td>Antenas GSM e GNSS (GPS + GLONASS) integradas</td></tr> <tr><th><strong>Posicionador</strong></th> <td>Posicionador GPS/GLONASS XA Series</td></tr> <tr><th><strong>Modem</strong></th> <td>Modem LTE CAT-M1 e NB-IoT com fallback para 2G</td></tr> <tr><th><strong>Bluetooth</strong></th> <td>Porta serial Bluetooth Clássico v3.0</td></tr> <tr><th><strong>Bateria</strong></th> <td>Bateria interna de 1100 mA/h</td></tr> <tr><th><strong>Proteção de Tensão</strong></th> <td><p>Proteção de tensão máxima em entradas:</p> <ul><li>48V na IN0 e IN2</li> <li>15V na IN1 e IN3</li></ul></td></tr> <tr><th><strong>Entradas</strong></th> <td><p>4 entradas (IN0 a IN3) com múltiplas funções:</p> <ul><li>IN0 pode ser utilizada como digital ou analógica (com faixa de leitura de 0 a 17Vcc);</li> <li>IN1 e IN2 são utilizadas para leitura CAN (na versão CAN BT) ou digital (na versão FULL);</li> <li>IN3 pode ser utilizada como digital, ou RX da porta COM1 (serial TTL), ou OneWire em conjunto com OUT1;</li> <li>IN0 possui pullup de 10K a 3V em modo digital ou pulldown de 10K a GND em modo analógico;</li> <li>IN0 possui resistor em série de 47K em modos digital ou analógico;</li> <li>IN1, IN2 e IN3 têm pullup de 47K a 3V;</li> <li>IN2 é compartilhada com saída VOT1 protegida com polyswitch de 250mA (podendo ser utilizada como saída de alimentação com tensão de 4,2V).</li></ul></td></tr> <tr><th><strong>Saídas</strong></th> <td><ul><li>OUT0 e OUT1 em NA (coletor aberto) protegidas com polyswitch de 400mA;</li> <li>OUT1 pode ser usada como saída digital, ou TX da porta COM1 (serial TTL), ou OneWire em conjunto com IN3;</li> <li>OUT1 possui pullup de 5K a 3V.</li></ul></td></tr> <tr><th><strong>Acelerômetro</strong></th> <td>Acelerômetro de 3 eixos com medição plana ou rotacional de eixos.</td></tr> <tr><th><strong>SIM Card</strong></th> <td>Duplo SIMCARD (Mini-SIM 2FF).</td></tr> <tr><th><strong>Rede CAN</strong></th> <td><ul><li>Leitura da rede CAN por cabo utilizando IN1 e In2 na versão CAN BT;</li> <li>Leitura de rede CAN por periférico indutivo (VirCAN) na versão FULL</li></ul></td></tr> <tr><th><strong>Gabinete</strong></th> <td>Gabinete resistente a água e poeira com grau de proteção <strong>IP66</strong>.</td></tr></tbody></table></figure><div></div><p>&nbsp;</p><div></div><h1 id="modelos-de-virloc-06" class="toc-header"><a href="#modelos-de-virloc-06" class="toc-anchor">¶</a> ? Modelos de Virloc 06</h1><div></div><figure class="image"><img src="/vl6_modelos.png"></figure><div></div><p>&nbsp;</p><div></div></div>
